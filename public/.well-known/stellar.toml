name="Castel Rupiah"
desc="""
An Indonesian rupiah unit of account on Stellar, used as the settlement leg between a
visitor's deposit and a rupiah payout to an Indonesian merchant or cash agent.
"""
conditions="""
TESTNET ONLY. cIDR is issued on the Stellar test network for this prototype and carries
no fiat backing and no redemption right. In production the issuer is intended to be an
OJK-licensed provider holding rupiah reserves 1:1, and the issuer account already carries
Stellar's native compliance flags (AUTH_REVOCABLE, AUTH_CLAWBACK_ENABLED) so that
balances can be frozen or reversed in response to fraud or a lawful order.
"""
