ORG_NAME="Castel"
ORG_DBA="Castel — Cash on Stellar"
ORG_URL="https://castelpay.vercel.app"
ORG_DESCRIPTION="""
Castel gives foreign visitors to Bali a way to pay Indonesian QRIS merchants and to
withdraw rupiah in cash, without an Indonesian bank account, SIM card or national ID.
Visitors are onboarded over WhatsApp; funds arrive as USDC on Stellar and are converted
to rupiah through Stellar's built-in DEX using a path payment. Merchants are always
settled in Indonesian rupiah through a licensed payment provider — never in a digital
asset. Cash withdrawal is escrowed on-chain with a Soroban contract and paid out by
partner money changers acting as agents.
"""
ORG_GITHUB="CastelPay"
ORG_SUPPORT_EMAIL="samuelgeraldy01@gmail.com"
ORG_OFFICIAL_EMAIL="samuelgeraldy01@gmail.com"

